name: Deploy Next.js ComercialQuality
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # 1. Instalar herramientas globales
          npm install -g pnpm pm2
          
          # 2. Autorizar específicamente a 'sharp' para que pueda compilarse
          # Esto elimina el error [ERR_PNPM_IGNORED_BUILDS]
          pnpm config set only-built-dependencies sharp
          
          # 3. Instalar dependencias
          pnpm install
        shell: powershell

      - name: Build Project
        run: pnpm run build
        shell: powershell

      - name: Deploy to IIS Folder
        run: |
          $sourcePath = "."
          $destinationPath = "C:\inetpub\wwwroot\NextQuality"
          # Robocopy es excelente, pero asegúrate de que el destino exista
          if (!(Test-Path $destinationPath)) { New-Item -ItemType Directory -Path $destinationPath }
          
          robocopy $sourcePath $destinationPath /MIR /V /NP /XD node_modules .git .github /XF .env .env.local web.config ecosystem.config.js
          if ($lastexitcode -lt 8) { exit 0 } else { exit $lastexitcode }
        shell: powershell

      - name: Restart App with PM2
        run: |
          # Entrar al directorio donde vive la app final
          cd "C:\inetpub\wwwroot\NextQuality"
          
          # Intentar reiniciar, si no existe, arrancarlo por primera vez
          # Esto es más limpio que borrar y crear cada vez
          pm2 restart "calidad-comercial" --if-not-exists -- ecosystem.config.js
          pm2 save
        shell: powershell
