name: Deploy Next.js ComercialQuality

on:
  push:
    branches: [ "main" ] 

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        # Aseguramos la instalación de pnpm y sus dependencias en el servidor de León
        run: |
          npm install -g pnpm
          npx pnpm install
        shell: powershell

      - name: Build Project
        # Generamos la carpeta .next optimizada
        run: npx pnpm run build
        shell: powershell

      - name: Deploy to IIS Folder
        run: |
          $sourcePath = "."
          $destinationPath = "C:\inetpub\wwwroot\NextQuality"

          # Sincronizamos archivos fuente y build hacia el IIS
          # Excluimos node_modules y .git para mantener la carpeta limpia
          robocopy $sourcePath $destinationPath /MIR /V /NP /XD node_modules .git .github /XF .env

          if ($lastexitcode -lt 8) { exit 0 } else { exit $lastexitcode }
        shell: powershell

      - name: Restart App with PM2
        run: |
          # Lógica compatible con PowerShell para reiniciar o iniciar la app
          try {
              Write-Host "Intentando reiniciar la app en PM2..."
              pm2 restart "comercial-quality"
          } catch {
              Write-Host "La app no existe en PM2, iniciando por primera vez..."
              pm2 start node_modules/next/dist/bin/next --name "comercial-quality" -- start
          }
        shell: powershell
