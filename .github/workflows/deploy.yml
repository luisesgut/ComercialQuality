name: Deploy Next.js ComercialQuality

on:
  push:
    branches: [ "main" ] 

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        # Usamos npx para asegurar que pnpm se ejecute incluso si no está en el PATH
        run: |
          npm install -g pnpm
          npx pnpm install
        shell: powershell

      - name: Build Project
        # npx asegura que encuentre el ejecutable de pnpm para el build
        run: npx pnpm run build
        shell: powershell

      - name: Deploy to IIS Folder
        run: |
          $sourcePath = "."
          $destinationPath = "C:\inetpub\wwwroot\NextQuality"

          # Sincronizamos archivos fuente y el build (.next) hacia la carpeta del IIS
          # Excluimos node_modules porque se gestionan en el paso anterior y .env por seguridad
          robocopy $sourcePath $destinationPath /MIR /V /NP /XD node_modules .git .github /XF .env

          if ($lastexitcode -lt 8) { exit 0 } else { exit $lastexitcode }
        shell: powershell

      - name: Restart App with PM2
        run: |
          # Usamos la ruta directa al binario de next para evitar fallos de permisos
          pm2 restart "comercial-quality" || pm2 start node_modules/next/dist/bin/next --name "comercial-quality" -- start
        shell: powershell
